name: CI

# Turns "every number in the README reproduces" from a claim into a check.
#
# Two jobs:
#   unit       -- fast, hermetic (numpy/scipy only), runs on synthetic audio.
#   reproduce  -- downloads CatMeows (cached) and asserts the baseline table.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Feature tests need only the DSP stack, not sklearn/torch. Keep it lean.
      - name: Install DSP + test deps
        run: python -m pip install --upgrade pip numpy scipy "pytest>=7.0"

      - name: Run hermetic unit tests
        run: python -m pytest -q -m "not data"

  reproduce:
    name: Reproduce baseline table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # CatMeows is an immutable Zenodo record, so a constant cache key is safe
      # and means we hit the network at most once.
      - name: Cache CatMeows
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data
          key: catmeows-zenodo-4008297-v1

      - name: Install baseline deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy scikit-learn pandas "pytest>=7.0"

      - name: Download CatMeows (on cache miss)
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python src/download_data.py

      - name: Assert the README numbers still hold
        run: python -m pytest -q -m data
